---
- name: Wdrożenie stacku monitoringu (Zabbix + Grafana + Prometheus)
  hosts: app
  become: true

  vars:
    monitoring_dir: /opt/monitoring
    db_host: 192.168.40.212

  tasks:
    - name: Utwórz katalog monitoringu
      ansible.builtin.file:
        path: "{{ monitoring_dir }}"
        state: directory
        mode: "0755"

    - name: Wdróż docker-compose.yml dla monitoringu
      ansible.builtin.template:
        src: monitoring-compose.yml.j2
        dest: "{{ monitoring_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Wdróż konfigurację Prometheus
      ansible.builtin.copy:
        dest: "{{ monitoring_dir }}/prometheus.yml"
        mode: "0644"
        content: |
          global:
            scrape_interval: 15s
            evaluation_interval: 15s

          scrape_configs:
            - job_name: prometheus
              static_configs:
                - targets: ["localhost:9090"]

            - job_name: node_exporter
              static_configs:
                - targets:
                    - "192.168.40.200:9100"
                    - "192.168.40.201:9100"
                    - "192.168.40.202:9100"
                    - "192.168.40.203:9100"
                    - "192.168.40.204:9100"
                    - "192.168.40.205:9100"
                    - "192.168.40.210:9100"
                    - "192.168.40.211:9100"
                    - "192.168.40.212:9100"

    - name: Uruchom stack monitoringu
      community.docker.docker_compose_v2:
        project_src: "{{ monitoring_dir }}"
        state: present

    - name: Firewalld – porty monitoringu
      ansible.posix.firewalld:
        port: "{{ item }}/tcp"
        permanent: true
        state: enabled
        immediate: true
      loop:
        - "3000"   # Grafana
        - "8080"   # Zabbix frontend
        - "9090"   # Prometheus
        - "10051"  # Zabbix server

---
- name: Instalacja Node Exporter na wszystkich hostach
  hosts: all
  become: true

  vars:
    node_exporter_version: "1.8.2"
    node_exporter_user: node_exporter

  tasks:
    - name: Instalacja tar
      ansible.builtin.dnf:
        name: tar
        state: present

    - name: Utwórz użytkownika node_exporter
      ansible.builtin.user:
        name: "{{ node_exporter_user }}"
        system: true
        shell: /sbin/nologin
        create_home: false

    - name: Pobierz Node Exporter
      ansible.builtin.get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
        dest: /tmp/node_exporter.tar.gz
        mode: "0644"

    - name: Rozpakuj Node Exporter
      ansible.builtin.unarchive:
        src: /tmp/node_exporter.tar.gz
        dest: /tmp/
        remote_src: true

    - name: Skopiuj binarny plik Node Exporter
      ansible.builtin.copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
        dest: /usr/local/bin/node_exporter
        mode: "0755"
        owner: "{{ node_exporter_user }}"
        remote_src: true

    - name: Utwórz systemd unit dla Node Exporter
      ansible.builtin.copy:
        dest: /etc/systemd/system/node_exporter.service
        mode: "0644"
        content: |
          [Unit]
          Description=Prometheus Node Exporter
          After=network.target

          [Service]
          User={{ node_exporter_user }}
          ExecStart=/usr/local/bin/node_exporter
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target

    - name: Uruchomienie i włączenie Node Exporter
      ansible.builtin.systemd:
        name: node_exporter
        enabled: true
        state: started
        daemon_reload: true

    - name: Firewalld – zezwól Node Exporter
      ansible.posix.firewalld:
        port: 9100/tcp
        permanent: true
        state: enabled
        immediate: true

- name: Instalacja Zabbix Agent 2
  hosts: all
  become: true

  vars:
    zabbix_server_ip: "192.168.40.211"

  tasks:
    - name: Dodaj repozytorium Zabbix 7.4
      ansible.builtin.dnf:
        name: "https://repo.zabbix.com/zabbix/7.4/release/rocky/10/noarch/zabbix-release-latest-7.4.el10.noarch.rpm"
        state: present
        disable_gpg_check: true

    - name: Instalacja Zabbix Agent 2
      ansible.builtin.dnf:
        name: zabbix-agent2
        state: present

    - name: Konfiguracja Zabbix Agent 2
      ansible.builtin.template:
        src: zabbix_agent2.conf.j2
        dest: /etc/zabbix/zabbix_agent2.conf
        mode: "0644"
      notify: Restart Zabbix Agent

    - name: Uruchomienie i włączenie Zabbix Agent 2
      ansible.builtin.systemd:
        name: zabbix-agent2
        enabled: true
        state: started

    - name: Firewalld – zezwól Zabbix Agent (pasywny)
      ansible.posix.firewalld:
        port: 10050/tcp
        permanent: true
        state: enabled
        immediate: true

  handlers:
    - name: Restart Zabbix Agent
      ansible.builtin.systemd:
        name: zabbix-agent2
        state: restarted

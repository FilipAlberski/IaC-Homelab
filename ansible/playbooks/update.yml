---
- name: Aktualizacja systemu – wszystkie węzły RHCE
  hosts: rhce
  become: true

  tasks:
    - name: Aktualizacja wszystkich pakietów
      ansible.builtin.dnf:
        name: "*"
        state: latest
        update_cache: true

    - name: Sprawdź czy potrzebny restart (nowy kernel)
      ansible.builtin.shell: needs-restarting -r
      register: needs_restart
      changed_when: false
      failed_when: false

    - name: Restart jeśli wymagany
      ansible.builtin.reboot:
        reboot_timeout: 300
      when: needs_restart.rc == 1

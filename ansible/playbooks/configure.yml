---
- name: Bazowa konfiguracja – wszystkie węzły RHCE
  hosts: rhce
  become: true

  vars:
    packages_install:
      - vim
      - git
      - htop
      - curl
      - wget
      - bash-completion
      - qemu-guest-agent

    sysctl_settings:
      vm.swappiness: 10
      net.ipv4.ip_forward: 1

  tasks:
    - name: Instalacja pakietów
      ansible.builtin.dnf:
        name: "{{ packages_install }}"
        state: present

    - name: Uruchomienie qemu-guest-agent
      ansible.builtin.systemd:
        name: qemu-guest-agent
        enabled: true
        state: started

    - name: Konfiguracja sysctl
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop: "{{ sysctl_settings | dict2items }}"

    - name: Firewalld – uruchomienie
      ansible.builtin.systemd:
        name: firewalld
        enabled: true
        state: started

    - name: Firewalld – zezwól SSH
      ansible.posix.firewalld:
        service: ssh
        permanent: true
        state: enabled
        immediate: true

- name: Konfiguracja control node
  hosts: control
  become: true

  tasks:
    - name: Instalacja Ansible na control node
      ansible.builtin.dnf:
        name:
          - ansible-core
          - python3-pip
        state: present

    - name: Konfiguracja SSH – generuj klucz dla użytkownika ansible
      ansible.builtin.user:
        name: ansible
        generate_ssh_key: true
        ssh_key_type: ed25519
        ssh_key_file: .ssh/id_ed25519

- name: Konfiguracja managed nodes
  hosts: nodes
  become: true

  tasks:
    - name: Firewalld – zezwól na dodatkowe usługi (RHCE ćwiczenia)
      ansible.posix.firewalld:
        service: "{{ item }}"
        permanent: true
        state: enabled
        immediate: true
      loop:
        - http
        - https
        - nfs
        - nfs3

---
- name: Bazowa konfiguracja Rocky Linux
  hosts: rocky
  become: true

  vars:
    packages_install:
      - vim
      - git
      - htop
      - curl
      - wget
      - qemu-guest-agent

    packages_remove:
      - telnet

    sysctl_settings:
      vm.swappiness: 10
      net.ipv4.ip_forward: 1

  tasks:
    - name: Instalacja pakietów
      ansible.builtin.dnf:
        name: "{{ packages_install }}"
        state: present

    - name: Usunięcie zbędnych pakietów
      ansible.builtin.dnf:
        name: "{{ packages_remove }}"
        state: absent

    - name: Uruchomienie qemu-guest-agent
      ansible.builtin.systemd:
        name: qemu-guest-agent
        enabled: true
        state: started

    - name: Konfiguracja sysctl
      ansible.posix.sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        sysctl_set: true
        state: present
        reload: true
      loop: "{{ sysctl_settings | dict2items }}"

    - name: Konfiguracja SELinux – permissive (opcjonalnie zmień na enforcing)
      ansible.posix.selinux:
        policy: targeted
        state: permissive

    - name: Firewalld – uruchomienie
      ansible.builtin.systemd:
        name: firewalld
        enabled: true
        state: started

    - name: Firewalld – zezwól SSH
      ansible.posix.firewalld:
        service: ssh
        permanent: true
        state: enabled
        immediate: true
